name: Build precompiled NIFs

# Runs only when a version tag is pushed (or manually), so CI is used solely for
# cutting releases — no build on every commit.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build_release:
    name: NIF ${{ matrix.nif }} - ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      # Serialize the jobs: on a tag, each uploads to the same GitHub Release, and
      # concurrent creation races (softprops/action-gh-release → "already_exists").
      max-parallel: 1
      matrix:
        nif: ["2.15"]
        # gnu (Debian/Ubuntu, incl. Fly.io's default image) + macOS. Both macOS targets
        # build on the Apple-Silicon runner (macos-14); the deprecated macos-13 x86 runner
        # is avoided. musl (Alpine) is intentionally deferred to 0.1.1 — `cross` v0.2.4
        # fails to build it here; Alpine users fall back to `force_build` meanwhile.
        job:
          - { target: aarch64-apple-darwin, os: macos-14 }
          - { target: x86_64-apple-darwin, os: macos-14 }
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-22.04 }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-22.04, use-cross: true }

    steps:
      - uses: actions/checkout@v4

      - name: Extract project version from mix.exs
        shell: bash
        run: |
          echo "PROJECT_VERSION=$(sed -n 's/^  @version "\(.*\)"/\1/p' mix.exs | head -n1)" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.target }}

      - name: Build the precompiled NIF
        id: build-crate
        uses: philss/rustler-precompiled-action@v1.1.5
        with:
          project-name: stemmers
          project-version: ${{ env.PROJECT_VERSION }}
          target: ${{ matrix.job.target }}
          nif-version: ${{ matrix.nif }}
          use-cross: ${{ matrix.job.use-cross }}
          project-dir: "native/stemmers"

      - name: Artifact upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build-crate.outputs.file-name }}
          path: ${{ steps.build-crate.outputs.file-path }}

      - name: Publish archives and packages
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.build-crate.outputs.file-path }}
        if: startsWith(github.ref, 'refs/tags/')
